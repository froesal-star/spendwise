<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SpendWise"/>
<meta name="theme-color" content="#13112a"/>
<title>SpendWise</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove, set }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDB21rD8B3f_b2rLcIiulAqgrZIYdyPLvI",
    authDomain: "controle-de-custos-39c67.firebaseapp.com",
    databaseURL: "https://controle-de-custos-39c67-default-rtdb.firebaseio.com",
    projectId: "controle-de-custos-39c67",
    storageBucket: "controle-de-custos-39c67.firebasestorage.app",
    messagingSenderId: "320742412317",
    appId: "1:320742412317:web:acc6d8fdcfe5597e3c36f4"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._db=db; window._ref=ref; window._onValue=onValue;
  window._push=push; window._remove=remove; window._set=set;
  window._fbReady=true; window.dispatchEvent(new Event("fbready"));
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#13112a;--bg2:#1c1a35;--bg3:#242240;--card:#1e1c38;--card2:#2a2750;
  --green:#2dc76d;--green2:#22a558;--gna:#2dc76d22;
  --red:#f0483e;--rda:#f0483e22;--purple:#7b5ea7;--pink:#e91e8c;
  --yellow:#fbbf24;--text:#f0eeff;--text2:#9b96c9;--text3:#5e5a8a;
  --border:#2e2b52;--r:20px;--rs:14px;--rx:10px
}
html,body{height:100%;background:var(--bg);margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
#topbar{background:var(--bg2);padding:env(safe-area-inset-top,12px) 18px 0;flex-shrink:0;border-bottom:1px solid var(--border)}
.tbrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--text)}
.logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--green),#00c9a7);display:flex;align-items:center;justify-content:center;font-size:16px}
.tbright{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
.tb-cfg{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.navtabs{display:flex;border-bottom:1px solid var(--border)}
.ntab{flex:1;padding:9px 0;border:none;background:transparent;color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;letter-spacing:.3px}
.ntab .ni{font-size:17px}.ntab.on{color:var(--green);border-bottom-color:var(--green)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}
.content{padding:16px 14px 100px}
.period-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px}
.parrow{background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;border-radius:9px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.plabel{font-size:14px;font-weight:700;color:var(--text);min-width:150px;text-align:center}
.wscroll{display:flex;gap:11px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:18px}
.wscroll::-webkit-scrollbar{display:none}
.wcard{min-width:185px;border-radius:var(--r);padding:17px;position:relative;overflow:hidden;flex-shrink:0}
.wcard-glow{position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1)}
.wcard-glow2{position:absolute;bottom:-15px;left:15px;width:55px;height:55px;border-radius:50%;background:rgba(255,255,255,.06)}
.wcard-lbl{font-size:10px;color:rgba(255,255,255,.75);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.wcard-bal{font-size:22px;font-weight:900;color:#fff;margin-bottom:12px;letter-spacing:-.5px}
.wcard-foot{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.7);font-weight:600}
.wcard-add{min-width:50px;height:50px;border-radius:50%;border:2px dashed var(--border);background:transparent;color:var(--text3);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center;transition:all .2s}
.wcard-add:hover{border-color:var(--green);color:var(--green)}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.scard{background:var(--card);border-radius:var(--rs);padding:13px 14px;border:1px solid var(--border)}
.scard-lbl{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.scard-val{font-size:19px;font-weight:900;letter-spacing:-.5px}
.chart-box{background:var(--card);border-radius:var(--r);padding:15px;border:1px solid var(--border);margin-bottom:18px}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.chart-title{font-size:13px;font-weight:700;color:var(--text)}
.chart-badge{font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px}
.chart-legend{display:flex;gap:12px;margin-bottom:10px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-weight:600}
.cl-dot{width:8px;height:8px;border-radius:50%}
.sec{display:flex;justify-content:space-between;align-items:center;margin:4px 0 11px}
.sec-title{font-size:14px;font-weight:700;color:var(--text)}
.sec-link{font-size:12px;color:var(--green);cursor:pointer;font-weight:700}
.tx-day-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:11px 0 6px;display:flex;justify-content:space-between}
.txlist{display:flex;flex-direction:column;gap:6px}
.txitem{background:var(--card);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:11px;border:1px solid var(--border)}
.txico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txinfo{flex:1;min-width:0}
.txname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txsub{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}
.txwho{font-size:10px;padding:2px 6px;border-radius:5px;background:var(--bg3);color:var(--text2);font-weight:700;margin-top:3px;display:inline-block}
.txval{font-size:14px;font-weight:900;white-space:nowrap}
.bcard{background:var(--card);border-radius:var(--rs);padding:13px 15px;border:1px solid var(--border);margin-bottom:7px}
.bcard-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.bcard-left{display:flex;align-items:center;gap:9px}
.bico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px}
.bname{font-size:13px;font-weight:700}.bsub{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}
.bpct{font-size:13px;font-weight:900}
.prog{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog-days{font-size:10px;color:var(--text3);text-align:right}
.catstat{background:var(--card);border-radius:var(--rs);padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:11px;margin-bottom:6px}
.catstat-bars{flex:1}
.catstat-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.catstat-name{font-weight:700}.catstat-val{font-weight:900}
.catstat-bar{height:5px;border-radius:3px;background:var(--bg3)}
.catstat-fill{height:100%;border-radius:3px}
.catstat-pct{font-size:10px;color:var(--text3);margin-top:4px;font-weight:600}
#fab{position:absolute;bottom:calc(62px + env(safe-area-inset-bottom,0px) + 10px);left:50%;transform:translateX(-50%);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--green),#00c9a7);border:none;color:#fff;font-size:27px;cursor:pointer;box-shadow:0 4px 20px rgba(45,199,109,.5);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
#fab:active{transform:translateX(-50%) scale(.92)}
#bottomnav{position:absolute;bottom:0;left:0;right:0;height:calc(62px + env(safe-area-inset-bottom,0px));background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.bnbtn{flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:700;padding:6px 0;font-family:inherit;letter-spacing:.3px;transition:color .2s}
.bnbtn .bnico{font-size:19px}.bnbtn.on{color:var(--green)}
.overlay{position:fixed;inset:0;background:rgba(10,9,25,.8);z-index:300;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:18px 17px calc(36px + env(safe-area-inset-bottom,0px));width:100%;max-height:88%;overflow-y:auto;scrollbar-width:none}
.modal::-webkit-scrollbar{display:none}
.mhandle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:16px;font-weight:900;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:var(--bg3);border:none;width:30px;height:30px;border-radius:50%;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ttoggle{display:flex;background:var(--bg3);border-radius:var(--rx);padding:4px;gap:4px;margin-bottom:15px}
.ttbtn{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:11px;font-weight:800;cursor:pointer;color:var(--text3);transition:all .2s;font-family:inherit}
.ttbtn.on-g{background:var(--rda);color:var(--red)}.ttbtn.on-r{background:var(--gna);color:var(--green)}
.amtwrap{text-align:center;margin:4px 0 16px;position:relative}
.amtcur{font-size:20px;color:var(--text2);font-weight:800;position:absolute;left:50%;top:50%;transform:translate(-120%,-50%)}
.amtinput{background:transparent;border:none;font-size:40px;font-weight:900;color:var(--text);text-align:center;width:100%;outline:none;font-family:inherit}
.amtinput::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.fg{margin-bottom:11px}
.flabel{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.finput,.fselect{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:13px;font-family:inherit;color:var(--text);background:var(--bg3);outline:none;transition:border .2s}
.finput:focus,.fselect:focus{border-color:var(--green)}
.fselect option{background:var(--bg2)}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;max-height:160px;overflow-y:auto;padding-right:2px}
.catbtn{border-radius:11px;padding:9px 3px;border:1.5px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:9px;font-weight:700;color:var(--text2);font-family:inherit;transition:all .2s;letter-spacing:.2px}
.catbtn.on{border-color:var(--green);background:var(--gna);color:var(--green)}
.catbtn-ico{font-size:19px}
.wcolors{display:flex;flex-wrap:wrap;gap:8px}
.wcolor{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .2s}
.wcolor.on{border-color:#fff;transform:scale(1.15)}
.sbtn{width:100%;padding:14px;border-radius:var(--rs);background:linear-gradient(135deg,var(--green),#00c9a7);border:none;color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 18px rgba(45,199,109,.3);transition:opacity .15s}
.sbtn:active{opacity:.85}
.add-orc-btn{background:var(--gna);border:1.5px solid var(--green);color:var(--green);border-radius:var(--rx);padding:7px 13px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
.delbtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:3px 5px;transition:color .15s}
.delbtn:hover{color:var(--red)}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-ico{font-size:46px;margin-bottom:10px}
.empty-txt{font-size:13px;line-height:1.7;font-weight:500}
#loader{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.loader-logo{font-size:48px}.loader-txt{font-size:14px;color:var(--text2);font-weight:600}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CATEGORIAS MANAGER */
.cat-manage-item{background:var(--card);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);margin-bottom:7px}
.cat-manage-ico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-manage-info{flex:1}
.cat-manage-name{font-size:13px;font-weight:700}
.cat-manage-actions{display:flex;gap:4px}
.edit-btn{background:var(--bg3);border:none;width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center}
/* EMOJI PICKER */
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px;max-height:160px;overflow-y:auto}
.emoji-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:7px;font-size:18px;cursor:pointer;text-align:center;transition:all .2s}
.emoji-btn.on{border-color:var(--green);background:var(--gna)}
/* COLOR PICKER */
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .2s}
.color-dot.on{border-color:#fff;transform:scale(1.15)}
</style>
</head>
<body>
<div id="app">
  <div id="loader"><div class="loader-logo">💸</div><div class="loader-txt">Conectando...</div><div class="spinner"></div></div>

  <div id="topbar">
    <div class="tbrow">
      <div class="logo"><div class="logo-mark">💸</div>SpendWise</div>
      <div class="tbright">
        <div class="sync-dot" id="syncdot"></div>
        <button class="tb-cfg" onclick="goTab('config')" title="Configurações">⚙️</button>
        <button class="tb-avatar" id="tb-avatar" onclick="promptNome()">EU</button>
      </div>
    </div>
    <div class="navtabs">
      <button class="ntab on" data-tab="home" onclick="goTab('home')"><span class="ni">🏠</span>INÍCIO</button>
      <button class="ntab" data-tab="txs" onclick="goTab('txs')"><span class="ni">📋</span>LANÇAMENTOS</button>
      <button class="ntab" data-tab="budgets" onclick="goTab('budgets')"><span class="ni">🎯</span>ORÇAMENTOS</button>
      <button class="ntab" data-tab="stats" onclick="goTab('stats')"><span class="ni">📊</span>ANÁLISE</button>
    </div>
  </div>

  <div id="scroll"><div class="content" id="content"></div></div>
  <button id="fab" onclick="openOv('tx')">+</button>

  <div id="bottomnav">
    <button class="bnbtn on" id="bn-home" onclick="goTab('home')"><span class="bnico">🏠</span>INÍCIO</button>
    <button class="bnbtn" id="bn-txs" onclick="goTab('txs')"><span class="bnico">📋</span>LANÇAMENTOS</button>
    <div style="flex:1.2"></div>
    <button class="bnbtn" id="bn-budgets" onclick="goTab('budgets')"><span class="bnico">🎯</span>ORÇAMENTOS</button>
    <button class="bnbtn" id="bn-stats" onclick="goTab('stats')"><span class="bnico">📊</span>ANÁLISE</button>
  </div>

  <!-- MODAL TX -->
  <div class="overlay" id="ov-tx"><div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova Transação <button class="mclose" onclick="closeOv('tx')">✕</button></div>
    <div class="ttoggle">
      <button class="ttbtn on-g" id="tt-gasto" onclick="setTipo('gasto')">— Gasto</button>
      <button class="ttbtn" id="tt-receita" onclick="setTipo('receita')">+ Receita</button>
    </div>
    <div class="amtwrap"><span class="amtcur">R$</span>
      <input class="amtinput" type="number" id="f-val" placeholder="0,00" min="0" step="0.01" inputmode="decimal"/>
    </div>
    <div class="fg"><label class="flabel">Descrição</label>
      <input class="finput" type="text" id="f-desc" placeholder="Ex: Almoço, Salário..."/>
    </div>
    <div class="frow">
      <div><label class="flabel">Data</label><input class="finput" type="date" id="f-data"/></div>
      <div><label class="flabel">Carteira</label><select class="fselect" id="f-wallet"></select></div>
    </div>
    <div id="f-cat-sec"><label class="flabel">Categoria</label>
      <div class="catgrid" id="catgrid"></div>
    </div>
    <div class="fg"><label class="flabel">Nota (opcional)</label>
      <input class="finput" type="text" id="f-note" placeholder="Observação..."/>
    </div>
    <button class="sbtn" onclick="saveTx()">💾 Salvar para todos</button>
  </div></div>

  <!-- MODAL WALLET -->
  <div class="overlay" id="ov-wallet"><div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova Carteira <button class="mclose" onclick="closeOv('wallet')">✕</button></div>
    <div class="fg"><label class="flabel">Nome</label>
      <input class="finput" type="text" id="w-nome" placeholder="Ex: Conta Conjunta..."/>
    </div>
    <div class="fg"><label class="flabel">Saldo inicial (R$)</label>
      <input class="finput" type="number" id="w-saldo" placeholder="0,00" step="0.01"/>
    </div>
    <div class="fg"><label class="flabel">Cor</label><div class="wcolors" id="wcolors"></div></div>
    <button class="sbtn" onclick="saveWallet()">Criar Carteira</button>
  </div></div>

  <!-- MODAL ORC -->
  <div class="overlay" id="ov-orc"><div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Novo Orçamento <button class="mclose" onclick="closeOv('orc')">✕</button></div>
    <div class="fg"><label class="flabel">Categoria</label><select class="fselect" id="o-cat"></select></div>
    <div class="fg"><label class="flabel">Limite mensal (R$)</label>
      <input class="finput" type="number" id="o-lim" placeholder="0,00" step="0.01"/>
    </div>
    <button class="sbtn" onclick="saveOrc()">Salvar Orçamento</button>
  </div></div>

  <!-- MODAL EDITAR TX -->
  <div class="overlay" id="ov-edittx"><div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Editar Transação <button class="mclose" onclick="closeOv('edittx')">✕</button></div>
    <div class="ttoggle">
      <button class="ttbtn on-g" id="ett-gasto" onclick="setEditTipo('gasto')">— Gasto</button>
      <button class="ttbtn" id="ett-receita" onclick="setEditTipo('receita')">+ Receita</button>
    </div>
    <div class="amtwrap"><span class="amtcur">R$</span>
      <input class="amtinput" type="number" id="ef-val" placeholder="0,00" min="0" step="0.01" inputmode="decimal"/>
    </div>
    <div class="fg"><label class="flabel">Descrição</label>
      <input class="finput" type="text" id="ef-desc" placeholder="Ex: Almoço, Salário..."/>
    </div>
    <div class="frow">
      <div><label class="flabel">Data</label><input class="finput" type="date" id="ef-data"/></div>
      <div><label class="flabel">Carteira</label><select class="fselect" id="ef-wallet"></select></div>
    </div>
    <div id="ef-cat-sec"><label class="flabel">Categoria</label>
      <div class="catgrid" id="editcatgrid"></div>
    </div>
    <div class="fg"><label class="flabel">Nota (opcional)</label>
      <input class="finput" type="text" id="ef-note" placeholder="Observação..."/>
    </div>
    <input type="hidden" id="ef-key"/>
    <button class="sbtn" onclick="updateTx()">💾 Salvar alterações</button>
  </div></div>

  <!-- MODAL CATEGORIA -->
  <div class="overlay" id="ov-cat"><div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="cat-modal-title">Nova Categoria <button class="mclose" onclick="closeOv('cat')">✕</button></div>
    <div class="fg"><label class="flabel">Nome da categoria</label>
      <input class="finput" type="text" id="cat-nome" placeholder="Ex: Gastos Fixos, Pet..."/>
    </div>
    <div class="fg"><label class="flabel">Ícone</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="fg"><label class="flabel">Cor</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <input type="hidden" id="cat-edit-key"/>
    <button class="sbtn" onclick="saveCat()">Salvar Categoria</button>
  </div></div>
</div>

<script>
// ── DEFAULTS ──
const DEFAULT_CATS=[
  {id:"casa",n:"Casa",ico:"🏠",c:"#8B5CF6"},
  {id:"supermercado",n:"Supermercado",ico:"🛒",c:"#10B981"},
  {id:"carro",n:"Carro",ico:"🚗",c:"#3B82F6"},
  {id:"murilo",n:"Murilo",ico:"👦",c:"#F59E0B"},
  {id:"farmacia",n:"Farmácia",ico:"💊",c:"#EF4444"},
  {id:"saudebeleza",n:"Saúde/Beleza",ico:"💆",c:"#EC4899"},
  {id:"roupas",n:"Roupas",ico:"👗",c:"#e91e8c"},
  {id:"combustivel",n:"Combustível",ico:"⛽",c:"#F97316"},
  {id:"escola",n:"Escola",ico:"🎒",c:"#06B6D4"},
  {id:"viagem",n:"Viagem",ico:"✈️",c:"#6366F1"},
  {id:"lazer",n:"Lazer",ico:"🎉",c:"#fbbf24"},
  {id:"outros",n:"Outros",ico:"💡",c:"#7C5CBF"},
];
const EMOJIS=["🏠","🛒","🚗","👦","👧","💊","💆","👗","⛽","🎒","✈️","🎉","💡","🍔","🍕","☕","🎮","📱","💻","🏋️","🐾","🐶","🌿","💈","🏥","🎓","📚","💼","💰","🎁","🛠️","🏖️","🎵","🚌","🚕","🛵","🧴","🧹","💧","➡","🌐","📦","🧸","🏊","🎨","🍷","🧃","🛍️"];
const COLORS=["#EF4444","#F97316","#F59E0B","#fbbf24","#10B981","#2dc76d","#06B6D4","#3B82F6","#6366F1","#8B5CF6","#EC4899","#e91e8c","#7C5CBF","#92400E","#059669","#0284C7"];
const GRADS=[["#2dc76d","#00c9a7"],["#7b5ea7","#e91e8c"],["#f97316","#fbbf24"],["#3b82f6","#06b6d4"],["#ef4444","#f97316"],["#14b8a6","#3b82f6"]];

let UI={tab:"home",tipo:"gasto",catSel:"",mes:mesAtual()};
let DB_txs={},DB_wallets={},DB_orcs={},DB_cats={};
let CH={},meuNome=localStorage.getItem("sw_nome")||"Eu";
let selEmoji="🏠",selColor=COLORS[0];
function catsArr(){
  const db=Object.entries(DB_cats).map(([k,v])=>({...v,_key:k
}));
  return db.length?db:DEFAULT_CATS;
}
function getCat(id){return catsArr().find(c=>c.id===id||c._key===id)||{n:"Outros",ico:"💡",c:"#7C5CBF"}}
function mesAtual(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function hoje(){return new Date().toISOString().split("T")[0]}
function fmt(v){return"R$ "+Math.abs(+v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){return d?d.split("-").reverse().join("/"):""}
function labelMes(m){if(!m)return"";const[a,mo]=m.split("-");return new Date(a,mo-1,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}
function txsArr(){return Object.entries(DB_txs).map(([k,v])=>({...v,_key:k}))}
function walletsArr(){return Object.entries(DB_wallets).map(([k,v])=>({...v,_key:k}))}
function orcsArr(){return Object.entries(DB_orcs).map(([k,v])=>({...v,_key:k}))}
function txsMes(m){return txsArr().filter(t=>t.d&&t.d.startsWith(m||UI.mes))}
function saldoW(w){return(+{.saldo||0)+txsArr().filter(t=>t.wid===w._key).reduce((s,t)=>s+(t.tipo==="receita"?+t.v:-(+t.v)),0)}
function promptNome(){const n=prompt("Seu nome:",meuNome);if(n&&n.trim()){meuNome=n.trim();;localStorage.setItem("sw_nome",meuNome);document.getElementById("tb-avatar").textContent=meuNome.slice(0,2).toUpperCase()}}

function initFirebase(){
  const db=window._db,ref=window._ref,onValue=window._onValue;
  const dot=document.getElementById("syncdot");
  onValue(ref(db,"wallets"),snap=>{DB_wallets=snap.val()||{};if(!Object.keys(DB_wallets).length)window._push(ref(db,"wallets"),{nome:"Carteira Conjunta",saldo:0,gi:0});render()});
  onValue(ref(db,"txs"),snap=>{DB_txs=snap.val()||{};dot.className="sync-dot ok";render()},()=>{dot.className="sync-dot err"});
  onValue(ref(db,"orcs"),snap=>{DB_orcs=snap.val()||{};render()});
  onValue(ref(db,"cats"),snap=>{DB_cats=snap.val()||{};render()});
  document.getElementById("loader").style.display="none";
}
window.addEventListener("fbready",initFirebase);
setTimeout(()=>{if(!window._fbReady)document.getElementById("loader").innerHTML=`<div style="text-align:center;padding:24px;color:#f0eeff">Erro ao conectar.<br>Verifique a conexão.</div>`;},6000);

function destroyCharts(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={}}
function render(){
  destroyCharts();
  const c=document.getElementById("content");
  if(UI.tab==="home") c.innerHTML=renderHome();
  else if(UI.tab==="txs") c.innerHTML=renderTxs();
  else if(UI.tab==="budgets") c.innerHTML=renderBudgets();
  else if(UI.tab==="stats") c.innerHTML=renderStats();
  else if(UI.tab==="config") c.innerHTML=renderConfig();
  document.querySelectorAll(".ntab").forEach(b=>b.classList.toggle("on",b.dataset.tab===UI.tab));
  ["home","txs","budgets","stats"].forEach(t=>{const b=document.getElementById("bn-"+t);if(b)b.classList.toggle("on",t===UI.tab)});
  document.getElementById("tb-avatar").textContent=meuNome.slice(0,2).toUpperCase();
  if(!UI.catSel&&catsArr().length) UI.catSel=catsArr()[0]._key||catsArr()[0].id;
  fillCatGrid();fillWalletSel();fillOrcSel();
  requestAnimationFrame(()=>{if(UI.tab==="home")buildLine();if(UI.tab==="stats")buildPie()});
}

// ── HOME ──
function renderHome(){
  const txs=txsMes(),rec=txs.filter(t=>t.tipo==="receita").reduce((s,t)=>s+(+t.v),0),gas=txs.filter(t=>t.tipo==="gasto").reduce((s,t)=>s+(+t.v),0),sal=rec-gas;
  const wcards=walletsArr().map(w=>{const g=GRADS[w.gi%GRADS.length],wr=txsArr().filter(t=>t.wid===w._key&&t.tipo==="receita").reduce((s,t)=>s+(+t.v),0),wg=txsArr().filter(t=>t.wid===w._key&&t.tipo==="gasto").reduce((s,t)=>s+(+t.v),0);
    return`<div class="wcard" style="background:linear-gradient(135deg,${g[0]},${g[1]})"><div class="wcard-glow"></div><div class="wcard-glow2"></div><div class="wcard-lbl">${w.nome}</div><div class="wcard-bal">${fmt(saldoW(w))}</div><div class="wcard-foot"><span>↑ ${fmt(wr)}</span><span>↓ ${fmt(wg)}</span></div></div>`;
  }).join("");
  const recent=txsArr().sort((a,b)=>b._key.localeCompare(a._key)).slice(0,5);
  const txhtml=recent.length===0?`<div class="empty"><div class="empty-ico">💸</div><div class="empty-txt">Nenhuma transação ainda.<br>Toque <strong>+</strong> para adicionar!</div></div>`
    :recent.map(t=>{const cat=getCat(t.tipo==="gasto"?t.cat:"outros");return`<div class="txitem"><div class="txico" style="background:${cat.c}22">${cat.ico}</div><div class="txinfo"><div class="txname">${t.desc||""}</div><div class="txsub">${cat.n} · ${fmtDate(t.d)}${t.note?" · "+t.note:""}</div>${t.quem?`<span class="txwho">👤 ${t.quem}</span>`:""}</div><div style="text-align:right"><div class="txval" style="color:${t.tipo==="receita"?"#2dc76d":"#f0483e"}">${t.tipo==="receita"?"+":"-"}${fmt(t.v)}</div></div></div>`;}).join("");
  return`<div class="period-row"><button class="parrow" onclick="moveMes(-1)">‹</button><span class="plabel">${labelMes(UI.mes)}</span><button class="parrow" onclick="moveMes(1)">›</button></div>
    <div class="summary"><div class="scard"><div class="scard-lbl">📈 Receitas</div><div class="scard-val" style="color:#2dc76d">${fmt(rec)}</div></div><div class="scard"><div class="scard-lbl">📉 Gastos</div><div class="scard-val" style="color:#f0483e">${fmt(gas)}</div></div></div>
    <div class="chart-box"><div class="chart-head"><span class="chart-title">Fluxo financeiro</span><span class="chart-badge" style="color:${sal>=0?"#2dc76d":"#f0483e"};background:${sal>=0?"#2dc76d22":"#f0483e22"}">${sal>=0?"+":""}${fmt(sal)}</span></div><div class="chart-legend"><span class="cl-item"><span class="cl-dot" style="background:#2dc76d"></span>Receitas</span><span class="cl-item"><span class="cl-dot" style="background:#f0483e"></span>Gastos</span></div><div style="position:relative;height:145px"><canvas id="cline"></canvas></div></div>
    <div class="sec"><span class="sec-title">Últimas transações</span><span class="sec-link" onclick="goTab('txs')">Ver todas →</span></div>
    <div class="txlist">${txhtml}</div>`;
}

// ── TRANSACTIONS ──
function renderTxs(){
  const txs=txsMes().sort((a,b)=>b.d.localeCompare(a.d)||b._key.localeCompare(a._key));
  let h=periodHdr();
  if(!txs.length) return h+`<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">Nenhuma transação neste período.</div></div>`;
  const byDay={};txs.forEach(t=>{(byDay[t.d]=byDay[t.d]||[]).push(t)});
  Object.entries(byDay).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([d,items])=>{
    const dt=items.reduce((s,t)=>s+(t.tipo==="receita"?+t.v:-(+t.v)),0);
    h+=`<div class="tx-day-lbl"><span>${fmtDate(d)}</span><span style="color:${dt>=0?"#2dc76d":"#f0483e"}">${dt>=0?"+":""}${fmt(dt)}</span></div>`;
    h+=`<div class="txlist" style="margin-bottom:6px">`+items.map(t=>{const cat=getCat(t.tipo==="gasto"?t.cat:"outros");const w=walletsArr().find(x=>x._key===t.wid);
      return`<div class="txitem"><div class="txico" style="background:${cat.c}22">${cat.ico}</div><div class="txinfo"><div class="txname">${t.desc||""}</div><div class="txsub">${cat.n}${w?" · "+w.nome:""}${t.note?" · "+t.note:""}</div>${t.quem?`<span class="txwho">👤 ${t.quem}</span>`:""}</div><div style="text-align:right"><div class="txval" style="color:${t.tipo==="receita"?"#2dc76d":"#f0483e"}">${t.tipo==="receita"?"+":"-"}${fmt(t.v)}</div><div style="display:flex;gap:2px;justify-content:flex-end;margin-top:3px"><button class="delbtn" onclick="editTx('${t._key}')" style="color:var(--text2)">✏️</button><button class="delbtn" onclick="delTx('${t._key}')">🗑</button></div></div></div>`;
    }).join("")+`</div>`;
  });
  return h;
}

// ── BUDGETS ──
function renderBudgets(){
  const txs=txsMes();
  let h=`<div class="sec"><span class="sec-title">Orçamentos · ${labelMes(UI.mes)}</span><button class="add-orc-btn" onclick="openOv('orc')">+ Novo</button></div>`;
  const orcs=orcsArr();
  if(!orcs.length) return h+`<div class="empty"><div class="empty-ico">🎯</div><div class="empty-txt">Nenhum orçamento definido.</div></div>`;
  const[ano,mes]=UI.mes.split("-").map(Number),dim=new Date(ano,mes,0).getDate(),today=new Date(),dp=today.getFullYear()===ano&&today.getMonth()+1===mes?today.getDate():dim,dl=Math.max(0,dim-dp);
  orcs.forEach(o=>{const cat=getCat(o.cat),spent=txs.filter(t=>t.tipo==="gasto"&&t.cat===o.cat).reduce((s,t)=>s+(+t.v),0),pct=Math.min(100,Math.round(spent/(+o.lim)*100)),left=Math.max(0,+o.lim-spent),daily=dl>0?(left/dl):0,bc=pct>90?"#f0483e":pct>65?"#fbbf24":"#2dc76d";
    h+=`<div class="bcard"><div class="bcard-row"><div class="bcard-left"><div class="bico" style="background:${cat.c}22">${cat.ico}</div><div><div class="bname">${cat.n}</div><div class="bsub">${fmt(spent)} de ${fmt(o.lim)}</div></div></div><div style="text-align:right"><div class="bpct" style="color:${bc}">${pct}%</div><button class="delbtn" onclick="delOrc('${o._key}')">🗑</button></div></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${bc}"></div></div><div class="prog-days">Restam ${fmt(left)} · ${fmt(daily)}/dia · ${dl} dias</div></div>`;
  });
  return h;
}

// ── STATS ──
function renderStats(){
  const txs=txsMes(),gas=txs.filter(t=>t.tipo==="gasto"),totalG=gas.reduce((s,t)=>s+(+t.v),0),rec=txs.filter(t=>t.tipo==="receita").reduce((s,t)=>s+(+t.v),0),sal=rec-totalG;
  const byCat={},byPerson={};
  gas.forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+(+t.v);if(t.quem)byPerson[t.quem]=(byPerson[t.quem]||0)+(+t.v)});
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  let h=periodHdr();
  h+=`<div class="summary"><div class="scard"><div class="scard-lbl">📈 Receitas</div><div class="scard-val" style="color:#2dc76d">${fmt(rec)}</div></div><div class="scard"><div class="scard-lbl">📉 Gastos</div><div class="scard-val" style="color:#f0483e">${fmt(totalG)}</div></div><div class="scard"><div class="scard-lbl">💰 Saldo</div><div class="scard-val" style="color:${sal>=0?"#2dc76d":"#f0483e"}">${fmt(sal)}</div></div><div class="scard"><div class="scard-lbl">🔖 Lançamentos</div><div class="scard-val" style="color:#9b7fd4">${txs.length}</div></div></div>`;
  if(Object.keys(byPerson).length>1){
    h+=`<div class="sec"><span class="sec-title">👥 Gastos por pessoa</span></div>`;
    Object.entries(byPerson).sort((a,b)=>b[1]-a[1]).forEach(([nome,val])=>{const pct=totalG>0?((val/totalG)*100).toFixed(0):0;h+=`<div class="catstat"><div class="txico" style="background:#7b5ea722;width:38px;height:38px;border-radius:12px;font-size:17px;flex-shrink:0">👤</div><div class="catstat-bars"><div class="catstat-top"><span class="catstat-name">${nome}</span><span class="catstat-val">${fmt(val)}</span></div><div class="catstat-bar"><div class="catstat-fill" style="width:${pct}%;background:#7b5ea7"></div></div><div class="catstat-pct">${pct}% do total</div></div></div>`;});
  }
  if(sorted.length) h+=`<div class="chart-box" style="margin-top:4px"><div class="chart-head"><span class="chart-title">Gastos por categoria</span></div><div style="position:relative;height:195px"><canvas id="cpie"></canvas></div></div>`;
  h+=`<div class="sec"><span class="sec-title">Detalhamento</span></div>`;
  if(!sorted.length) return h+`<div class="empty"><div class="empty-ico">📊</div><div class="empty-txt">Sem gastos neste período.</div></div>`;
  sorted.forEach(([id,val])=>{const cat=getCat(id),pct=totalG>0?((val/totalG)*100).toFixed(1):0;h+=`<div class="catstat"><div class="txico" style="background:${cat.c}22;width:38px;height:38px;border-radius:12px;font-size:17px;flex-shrink:0">${cat.ico}</div><div class="catstat-bars"><div class="catstat-top"><span class="catstat-name">${cat.n}</span><span class="catstat-val">${fmt(val)}</span></div><div class="catstat-bar"><div class="catstat-fill" style="width:${pct}%;background:${cat.c}"></div></div><div class="catstat-pct">${pct}% do total</div></div></div>`;});
  return h;
}

// ── CONFIG ──
function renderConfig(){
  const cats=catsArr();
  let h=`<div class="sec"><span class="sec-title">⚙️ Categorias</span><button class="add-orc-btn" onclick="openCatModal()">+ Nova</button></div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:14px;font-weight:500">Toque no lápis para editar ou na lixeira para excluir.</div>`;
  h+=cats.map(c=>`<div class="cat-manage-item">
    <div class="cat-manage-ico" style="background:${c.c}22">${c.ico}</div>
    <div class="cat-manage-info"><div class="cat-manage-name">${c.n}</div></div>
    <div class="cat-manage-actions">
      <button class="edit-btn" onclick="openCatModal('${c._key||c.id}','${c.n}','${c.ico}','${c.c}')">✏️</button>
      <button class="edit-btn" style="color:#f0483e" onclick="delCat('${c._key||c.id}')">🗑</button>
    </div>
  </div>`).join("");
  h+=`<div style="margin-top:20px">
    <div class="sec"><span class="sec-title">👤 Meu perfil</span></div>
    <div class="cat-manage-item">
      <div class="cat-manage-ico" style="background:#7b5ea722">👤</div>
      <div class="cat-manage-info"><div class="cat-manage-name">${meuNome}</div><div style="font-size:10px;color:var(--text3)">Nome que aparece nas transações</div></div>
      <button class="edit-btn" onclick="promptNome()">✏️</button>
    </div>
  </div>`;
  return h;
}

function openCatModal(key='',nome='',ico='🏠',cor=COLORS[0]){
  selEmoji=ico||'🏠'; selColor=cor||COLORS[0];
  document.getElementById("cat-modal-title").innerHTML=`${key?"Editar":"Nova"} Categoria <button class="mclose" onclick="closeOv('cat')">✕</button>`;
  document.getElementById("cat-nome").value=nome;
  document.getElementById("cat-edit-key").value=key;
  // emoji grid
  document.getElementById("emoji-grid").innerHTML=EMOJIS.map(e=>`<button class="emoji-btn${e===selEmoji?" on":""}" onclick="selEmojiF('${e}')">${e}</button>`).join("");
  // color grid
  document.getElementById("color-grid").innerHTML=COLORS.map(c=>`<div class="color-dot${c===selColor?" on":""}" style="background:${c}" onclick="selColorF('${c}')" data-c="${c}"></div>`).join("");
  openOv('cat');
}
function selEmojiF(e){selEmoji=e;document.querySelectorAll(".emoji-btn").forEach(b=>b.classList.toggle("on",b.textContent===e))}
function selColorF(c){selColor=c;document.querySelectorAll(".color-dot").forEach(b=>b.classList.toggle("on",b.dataset.c===c))}

function saveCat(){
  const nome=document.getElementById("cat-nome").value.trim();
  const key=document.getElementById("cat-edit-key").value;
  if(!nome){alert("Informe o nome.");return}
  const data={n:nome,ico:selEmoji,c:selColor,id:nome.toLowerCase().replace(/\s+/g,"_")};
  if(key){
    // editar existente no Firebase
    window._set(window._ref(window._db,"cats/"+key),data);
  } else {
    window._push(window._ref(window._db,"cats"),data);
  }
  closeOv('cat');
}
function delCat(key){
  if(!confirm("Excluir esta categoria?")) return;
  // só remove do Firebase se tiver key real (não default)
  if(key&&key.length>10) window._remove(window._ref(window._db,"cats/"+key));
  else alert("Categorias padrão não podem ser excluídas pelo app. Adicione novas e deixe de usar as antigas.");
}

function periodHdr(){return`<div class="period-row"><button class="parrow" onclick="moveMes(-1)">‹</button><span class="plabel">${labelMes(UI.mes)}</span><button class="parrow" onclick="moveMes(1)">›</button></div>`}

function buildLine(){
  const el=document.getElementById("cline");if(!el)return;
  const[a,m]=UI.mes.split("-").map(Number),dim=new Date(a,m,0).getDate(),labels=[],rD=[],gD=[];
  for(let d=1;d<=dim;d++){const k=`${UI.mes}-${String(d).padStart(2,"0")}`,day=txsArr().filter(t=>t.d===k);labels.push(d);rD.push(day.filter(t=>t.tipo==="receita").reduce((s,t)=>s+(+t.v),0));gD.push(day.filter(t=>t.tipo==="gasto").reduce((s,t)=>s+(+t.v),0))}
  CH.line=new Chart(el,{type:"line",data:{labels,datasets:[{label:"Receitas",data:rD,borderColor:"#2dc76d",backgroundColor:"rgba(45,199,109,.12)",tension:.45,fill:true,pointRadius:3,pointBackgroundColor:"#2dc76d",pointBorderColor:"#13112a",pointBorderWidth:2},{label:"Gastos",data:gD,borderColor:"#f0483e",backgroundColor:"rgba(240,72,62,.10)",tension:.45,fill:true,pointRadius:3,pointBackgroundColor:"#f0483e",pointBorderColor:"#13112a",pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#5e5a8a",font:{size:9}},grid:{color:"#2e2b5230"}},y:{ticks:{color:"#5e5a8a",font:{size:9},callback:v=>"R$"+v},grid:{color:"#2e2b5230"}}}}});
}
function buildPie(){
  const el=document.getElementById("cpie");if(!el)return;
  const bc={};txsMes().filter(t=>t.tipo==="gasto").forEach(t=>{bc[t.cat]=(bc[t.cat]||0)+(+t.v)});
  const entries=Object.entries(bc).sort((a,b)=>b[1]-a[1]);if(!entries.length)return;
  CH.pie=new Chart(el,{type:"doughnut",data:{labels:entries.map(([id])=>getCat(id).n),datasets:[{data:entries.map(([,v])=>v),backgroundColor:entries.map(([id])=>getCat(id).c),borderWidth:3,borderColor:"#1e1c38",hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"bottom",labels:{color:"#9b96c9",font:{size:10},padding:8,boxWidth:10,usePointStyle:true}}}}});
}

function fillCatGrid(){
  const el=document.getElementById("catgrid");if(!el)return;
  const cats=catsArr();
  if(!UI.catSel) UI.catSel=cats[0]?._key||cats[0]?.id||"";
  el.innerHTML=cats.map(c=>{const k=c._key||c.id;return`<button class="catbtn${UI.catSel===k?" on":""}" onclick="selCat('${k}')"><span class="catbtn-ico">${c.ico}</span>${c.n}</button>`}).join("");
}
function fillWalletSel(){const fw=document.getElementById("f-wallet");if(!fw)return;fw.innerHTML=walletsArr().map(w=>`<option value="${w._key}">${w.nome}</option>`).join("")}
function fillOrcSel(){const el=document.getElementById("o-cat");if(!el)return;el.innerHTML=catsArr().map(c=>`<option value="${c._key||c.id}">${c.ico} ${c.n}</option>`).join("")}

function openOv(id){
  document.getElementById("ov-"+id).classList.add("open");
  if(id==="tx"){document.getElementById("f-data").value=hoje();setTipo(UI.tipo);fillCatGrid();fillWalletSel()}
  if(id==="wallet"){const wc=document.getElementById("wcolors");if(wc)wc.innerHTML=GRADS.map((g,i)=>`<div class="wcolor${i===0?" on":""}" style="background:linear-gradient(135deg,${g[0]},${g[1]})" onclick="selWG(${i})" data-i="${i}"></div>`).join("")}
  if(id==="orc")fillOrcSel();
}
function closeOv(id){document.getElementById("ov-"+id).classList.remove("open")}
function setTipo(t){UI.tipo=t;document.getElementById("tt-gasto").className="ttbtn"+(t==="gasto"?" on-g":"");document.getElementById("tt-receita").className="ttbtn"+(t==="receita"?" on-r":"");const cs=document.getElementById("f-cat-sec");if(cs)cs.style.display=t==="gasto"?"block":"none"}
function selCat(id){UI.catSel=id;fillCatGrid()}
function selWG(i){document.querySelectorAll(".wcolor").forEach(e=>e.classList.toggle("on",+e.dataset.i===i))}

function saveTx(){
  const v=parseFloat(document.getElementById("f-val").value),desc=document.getElementById("f-desc").value.trim(),d=document.getElementById("f-data").value,wid=document.getElementById("f-wallet").value,note=document.getElementById("f-note").value.trim();
  if(!v||v<=0){alert("Informe o valor.");return}if(!desc){alert("Informe a descrição.");return}if(!d){alert("Informe a data.");return}
  const data={tipo:UI.tipo,v,desc,d,cat:UI.tipo==="gasto"?UI.catSel:"outros",wid,quem:meuNome,ts:Date.now()};
  if(note)data.note=note;
  window._push(window._ref(window._db,"txs"),data);
  closeOv("tx");document.getElementById("f-val").value="";document.getElementById("f-desc").value="";document.getElementById("f-note").value="";
}
function saveWallet(){
  const nome=document.getElementById("w-nome").value.trim(),saldo=parseFloat(document.getElementById("w-saldo").value)||0,gi=[...document.querySelectorAll(".wcolor")].findIndex(e=>e.classList.contains("on"));
  if(!nome){alert("Informe o nome.");return}
  window._push(window._ref(window._db,"wallets"),{nome,saldo,gi:gi>=0?gi:0});closeOv("wallet");document.getElementById("w-nome").value="";document.getElementById("w-saldo").value="";
}
function saveOrc(){
  const cat=document.getElementById("o-cat").value,lim=parseFloat(document.getElementById("o-lim").value);
  if(!lim||lim<=0){alert("Informe o limite.");return}
  const ex=orcsArr().find(o=>o.cat===cat);if(ex)window._remove(window._ref(window._db,"orcs/"+ex._key));
  window._push(window._ref(window._db,"orcs"),{cat,lim});closeOv("orc");document.getElementById("o-lim").value="";
}
function delTx(key){if(confirm("Remover esta transação?"))window._remove(window._ref(window._db,"txs/"+key))}

let editTipoAtual="gasto",editCatSel="";
function editTx(key){
  const t=DB_txs[key];if(!t)return;
  editTipoAtual=t.tipo||"gasto";
  editCatSel=t.cat||"";
  document.getElementById("ef-key").value=key;
  document.getElementById("ef-val").value=t.v||"";
  document.getElementById("ef-desc").value=t.desc||"";
  document.getElementById("ef-data").value=t.d||"";
  document.getElementById("ef-note").value=t.note||"";
  // wallet
  const fw=document.getElementById("ef-wallet");
  fw.innerHTML=walletsArr().map(w=>`<option value="${w._key}"${w._key===t.wid?" selected":""}>${w.nome}</option>`).join("");
  // tipo toggle
  setEditTipo(editTipoAtual);
  // cat grid
  fillEditCatGrid();
  openOv('edittx');
}
function setEditTipo(t){
  editTipoAtual=t;
  document.getElementById("ett-gasto").className="ttbtn"+(t==="gasto"?" on-g":"");
  document.getElementById("ett-receita").className="ttbtn"+(t==="receita"?" on-r":"");
  const cs=document.getElementById("ef-cat-sec");if(cs)cs.style.display=t==="gasto"?"block":"none";
}
function fillEditCatGrid(){
  const el=document.getElementById("editcatgrid");if(!el)return;
  const cats=catsArr();
  if(!editCatSel) editCatSel=cats[0]?._key||cats[0]?.id||"";
  el.innerHTML=cats.map(c=>{const k=c._key||c.id;return`<button class="catbtn${editCatSel===k?" on":""}" onclick="selEditCat('${k}')"><span class="catbtn-ico">${c.ico}</span>${c.n}</button>`}).join("");
}
function selEditCat(id){editCatSel=id;fillEditCatGrid();}
function updateTx(){
  const key=document.getElementById("ef-key").value;
  const v=parseFloat(document.getElementById("ef-val").value);
  const desc=document.getElementById("ef-desc").value.trim();
  const d=document.getElementById("ef-data").value;
  const wid=document.getElementById("ef-wallet").value;
  const note=document.getElementById("ef-note").value.trim();
  if(!v||v<=0){alert("Informe o valor.");return}
  if(!desc){alert("Informe a descrição.");return}
  if(!d){alert("Informe a data.");return}
  const orig=DB_txs[key];
  const data={tipo:editTipoAtual,v,desc,d,cat:editTipoAtual==="gasto"?editCatSel:"outros",wid,quem:orig?.quem||meuNome,ts:orig?.ts||Date.now()};
  if(note)data.note=note;
  window._set(window._ref(window._db,"txs/"+key),data);
  closeOv('edittx');
}
function delOrc(key){if(confirm("Remover orçamento?"))window._remove(window._ref(window._db,"orcs/"+key))}
function goTab(t){UI.tab=t;render();document.getElementById("scroll").scrollTop=0}
function moveMes(d){const[a,m]=UI.mes.split("-").map(Number),nd=new Date(a,m-1+d,1);UI.mes=nd.getFullYear()+"-"+String(nd.getMonth()+1).padStart(2,"0");render()}
document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{if(e.target===o)o.classList.remove("open")}));
</script>
</body>
</html>
